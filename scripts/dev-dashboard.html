  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────── */

    header {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-brand svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .header-brand h1 {
      font-size: 15px;
      letter-spacing: 1px;
      line-height: 1;
    }

    .header-brand h1 .bold {
      font-weight: 700;
      color: #e0e0e0;
    }

    .header-brand h1 .thin {
      font-weight: 300;
      color: #45D6E9;
    }

    .header-status {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.alive { background: #4ecca3; }
    .status-dot.dead { background: #e94560; }
    .status-dot.building { background: #f0a500; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-item {
      font-size: 12px;
      color: #a0a0b0;
    }

    .status-item.alive { color: #4ecca3; }
    .status-item.building { color: #f0a500; }

    /* ── Controls ────────────────────────────────────────── */

    .controls {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .controls .action-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .controls button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a4a7a;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
    }

    .controls button svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .controls button:hover { background: #1a4a7a; }
    .controls button:disabled { opacity: 0.35; cursor: not-allowed; }
    .controls button:disabled:hover { background: #0f3460; }
    .controls button.danger { border-color: #e94560; }
    .controls button.danger:hover:not(:disabled) { background: #e94560; color: white; }
    .controls button.start { border-color: #4ecca3; }
    .controls button.start:hover:not(:disabled) { background: #4ecca3; color: #1a1a2e; }

    .controls .separator { width: 1px; height: 20px; background: #0f3460; margin: 0 4px; flex-shrink: 0; }

    .controls [title] { position: relative; }
    .controls [title]:hover::after {
      content: attr(title);
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 6px;
      background: #0f3460;
      color: #e0e0e0;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
      font-family: inherit;
    }

    .filter-group {
      display: flex;
      gap: 4px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid transparent;
      padding: 4px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.3;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
    }

    .filter-btn svg { width: 14px; height: 14px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .filter-btn.active { opacity: 1; background: rgba(255,255,255,0.06); }

    .log-line.level-warn .log-text { color: #f0a500; }
    .log-line.level-error .log-text { color: #e94560; }

    /* ── Log Output ─────────────────────────────────────── */

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scroll-behavior: smooth;
    }

    .log-line {
      padding: 1px 16px;
      display: flex;
      gap: 8px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-line:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .log-ts {
      color: #555570;
      flex-shrink: 0;
      user-select: none;
    }

    .log-source {
      flex-shrink: 0;
      font-weight: 600;
      min-width: 50px;
      user-select: none;
    }

    .log-source.ctrl { color: #f0a500; }
    .log-source.vite { color: #4ecca3; }
    .log-source.rust { color: #c77dff; }
    .log-source.sidecar { color: #ff6b6b; }
    .log-source.frontend { color: #74b9ff; }

    .log-text {
      flex: 1;
    }

    .log-line.level-error .log-source { color: #e94560; }

    /* ── Footer ─────────────────────────────────────────── */

    footer {
      background: #16213e;
      border-top: 1px solid #0f3460;
      padding: 4px 16px;
      font-size: 11px;
      color: #555570;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── Scrollbar ──────────────────────────────────────── */

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #1a4a7a; }
  </style>
</head>

      <h1><span class="bold">ORQA</span><span class="thin">DEV</span></h1>
    </div>
    <div class="header-status">
      <span class="status-item" id="vite-status">
        <span class="status-dot dead" id="vite-dot"></span>Vite
      </span>
      <span class="status-item" id="rust-status">
        <span class="status-dot dead" id="rust-dot"></span>Rust
      </span>

  <div class="controls">
    <div class="action-group">
      <button class="start" id="btn-start" onclick="sendCommand('start')" disabled title="Start">
        <svg viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
      </button>
      <button id="btn-restart" onclick="sendCommand('restart-tauri')" title="Restart Tauri">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
      </button>
      <button id="btn-restart-vite" onclick="sendCommand('restart-vite')" title="Restart Vite">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><polyline points="21 3 21 8 16 8"></polyline></svg>
      </button>
      <button id="btn-restart-all" onclick="sendCommand('restart')" title="Restart All">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
      </button>
      <button class="danger" id="btn-stop" onclick="sendCommand('stop')" title="Stop">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"></rect></svg>
      </button>
      <button id="btn-clear" onclick="clearLog()" title="Clear Log">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
    </div>

    <div class="separator"></div>

    <div class="filter-group">
      <button class="filter-btn active" data-source="ctrl" onclick="toggleFilter(this)" title="Controller">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#f0a500" stroke="none"/></svg>
      </button>
      <button class="filter-btn active" data-source="vite" onclick="toggleFilter(this)" title="Vite">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#4ecca3" stroke="none"/></svg>
      </button>
      <button class="filter-btn active" data-source="rust" onclick="toggleFilter(this)" title="Rust">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#c77dff" stroke="none"/></svg>
      </button>
      <button class="filter-btn active" data-source="sidecar" onclick="toggleFilter(this)" title="Sidecar">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#ff6b6b" stroke="none"/></svg>
      </button>
      <button class="filter-btn active" data-source="frontend" onclick="toggleFilter(this)" title="Frontend">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#74b9ff" stroke="none"/></svg>
      </button>
    </div>

    <div class="separator"></div>

    <div class="filter-group">
      <button class="filter-btn active" data-level="info" onclick="toggleLevelFilter(this)" title="Info">
        <svg viewBox="0 0 24 24" stroke="#a0a0b0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
      <button class="filter-btn active" data-level="warn" onclick="toggleLevelFilter(this)" title="Warnings">
        <svg viewBox="0 0 24 24" stroke="#f0a500"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
      <button class="filter-btn active" data-level="error" onclick="toggleLevelFilter(this)" title="Errors">
        <svg viewBox="0 0 24 24" stroke="#e94560"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </button>
    </div>
  </div>

  <div id="output"></div>

  <footer>
    <span id="line-count">0 lines</span>
    <span id="connection-status">Connecting...</span>
  </footer>

  <script>
    const output = document.getElementById('output');
    const lineCount = document.getElementById('line-count');
    const connStatus = document.getElementById('connection-status');
    const viteDot = document.getElementById('vite-dot');
    const rustDot = document.getElementById('rust-dot');
    const viteStatus = document.getElementById('vite-status');
    const rustStatus = document.getElementById('rust-status');

    const btnStart = document.getElementById('btn-start');
    const btnRestart = document.getElementById('btn-restart');
    const btnRestartVite = document.getElementById('btn-restart-vite');
    const btnRestartAll = document.getElementById('btn-restart-all');
    const btnStop = document.getElementById('btn-stop');

    let lines = 0;
    let autoScroll = true;
    const filters = { ctrl: true, vite: true, rust: true, sidecar: true, frontend: true };
    const levelFilters = { info: true, warn: true, error: true };

    // Track process state for button enabling
    let state = { vite: false, rust: false };

    // Auto-scroll detection
    output.addEventListener('scroll', () => {
      const { scrollTop, scrollHeight, clientHeight } = output;
      autoScroll = scrollHeight - scrollTop - clientHeight < 50;
    });

    function classifyLevel(text, isError) {
      if (isError) return 'error';
      const lower = text.toLowerCase();
      if (/\b(error|err!|panic|fatal)\b/.test(lower)) return 'error';
      if (/\b(warn|warning|warn!)\b/.test(lower)) return 'warn';
      return 'info';
    }

    function addLine(source, text, isError) {
      lines++;
      lineCount.textContent = `${lines} lines`;

      const level = classifyLevel(text, isError);
      const div = document.createElement('div');
      div.className = `log-line level-${level}`;
      div.dataset.source = source;
      div.dataset.level = level;
      if (!filters[source] || !levelFilters[level]) div.style.display = 'none';

      const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });

      div.innerHTML = `
        <span class="log-ts">${ts}</span>
        <span class="log-source ${source}">[${source}]</span>
        <span class="log-text">${escapeHtml(text)}</span>
      `;

      output.appendChild(div);
      if (autoScroll) div.scrollIntoView({ block: 'end' });
    }

    function escapeHtml(text) {
      // Strip ANSI escape codes for clean display
      text = text.replace(/\x1b\[[0-9;]*m/g, '');
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toggleFilter(btn) {
      const source = btn.dataset.source;
      filters[source] = !filters[source];
      btn.classList.toggle('active', filters[source]);
      applyAllFilters();
    }

    function toggleLevelFilter(btn) {
      const level = btn.dataset.level;
      levelFilters[level] = !levelFilters[level];
      btn.classList.toggle('active', levelFilters[level]);
      applyAllFilters();
    }

    function applyAllFilters() {
      document.querySelectorAll('.log-line').forEach(el => {
        const sourceOk = filters[el.dataset.source];
        const levelOk = levelFilters[el.dataset.level];
        el.style.display = (sourceOk && levelOk) ? '' : 'none';
      });
    }

    function clearLog() {
      output.innerHTML = '';
      lines = 0;
      lineCount.textContent = '0 lines';
    }

    function updateStatus(data) {
      if (data.vite !== undefined) {
        state.vite = data.vite;
        viteDot.className = `status-dot ${data.vite ? 'alive' : 'dead'}`;
        viteStatus.className = `status-item${data.vite ? ' alive' : ''}`;
      }
      if (data.rust !== undefined) {
        const isBuilding = data.rust === 'building';
        const isAlive = data.rust === true;
        state.rust = data.rust;
        const cls = isBuilding ? 'building' : (isAlive ? 'alive' : 'dead');
        rustDot.className = `status-dot ${cls}`;
        rustStatus.className = `status-item${isBuilding ? ' building' : (isAlive ? ' alive' : '')}`;
      }
      updateButtons();
    }

    function updateButtons() {
      const anyAlive = state.vite || state.rust;
      const allDead = !state.vite && !state.rust;

      // Start is only enabled when nothing is running (controller is alive but processes stopped)
      btnStart.disabled = anyAlive;
      // Restart/stop only when something is running
      btnRestart.disabled = !state.rust || state.rust === 'building';
      btnRestartVite.disabled = !state.vite;
      btnRestartAll.disabled = allDead;
      btnStop.disabled = allDead;
    }

    // SSE connection
    function connect() {
      const es = new EventSource('/events');

      es.onopen = () => {
        connStatus.textContent = 'Connected';
      };

      es.addEventListener('log', (e) => {
        const data = JSON.parse(e.data);
        addLine(data.source, data.text, data.error || false);
      });

      es.addEventListener('status', (e) => {
        updateStatus(JSON.parse(e.data));
      });

      es.onerror = () => {
        connStatus.textContent = 'Controller stopped';
        // When disconnected, everything is dead
        updateStatus({ vite: false, rust: false });
        // Controller is gone — disable all buttons
        btnStart.disabled = true;
        btnRestart.disabled = true;
        btnRestartVite.disabled = true;
        btnRestartAll.disabled = true;
        btnStop.disabled = true;
        // Try to close the tab (works when opened via window.open)
        setTimeout(() => window.close(), 1500);
      };
    }

    function sendCommand(cmd) {
      fetch(`/command/${cmd}`, { method: 'POST' })
        .then(r => r.json())
        .then(d => addLine('ctrl', d.message, false))
        .catch(e => addLine('ctrl', `Command failed: ${e.message}`, true));
    }

    connect();
